# Better prefix (Ctrl-a instead of Ctrl-b, easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start window numbering at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Mouse support (scroll, click to select panes/windows)
set -g mouse on

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Intuitive splits (| and -)
bind | split-window -h -c "#{pane_path}"
bind - split-window -v -c "#{pane_path}"

# Increase scrollback
set -g history-limit 50000
